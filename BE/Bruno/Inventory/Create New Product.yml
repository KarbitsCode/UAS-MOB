info:
  name: Create New Product
  type: http
  seq: 1

http:
  method: POST
  url: "{{BACKEND_URL}}/index.php?resource=inventory&apicall=loadData"
  params:
    - name: resource
      value: inventory
      type: query
    - name: apicall
      value: loadData
      type: query
  body:
    type: json
    data: |-
      {
        "nama_produk":"entah2",
        "harga":2600,
        "stok":3
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
