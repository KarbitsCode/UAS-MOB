info:
  name: Get All Pesanan
  type: http
  seq: 1

http:
  method: GET
  url: "{{BACKEND_URL}}/index.php?resource=pesanan&apicall=loadData"
  params:
    - name: resource
      value: pesanan
      type: query
    - name: apicall
      value: loadData
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
